# Docker Compose for running from pre-built GHCR images (no source code needed).
#
# Usage:
#   1. Copy .env.example to .env and fill in secrets
#   2. docker compose -f docker-compose.ghcr.yml up -d
#   3. Open http://localhost:8250
#
# To pin a specific version instead of latest:
#   DELEGACJE_VERSION=v1.4.1 docker compose -f docker-compose.ghcr.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: delegacje
      POSTGRES_USER: delegacje_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delegacje_user -d delegacje"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/holi87/delegacje-app/backend:${DELEGACJE_VERSION:-latest}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://delegacje_user:${DB_PASSWORD}@db:5432/delegacje
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8250}

  frontend:
    image: ghcr.io/holi87/delegacje-app/frontend:${DELEGACJE_VERSION:-latest}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8250}:80"

volumes:
  pgdata:
