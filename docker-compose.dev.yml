services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: delegacje
      POSTGRES_USER: delegacje_user
      POSTGRES_PASSWORD: delegacje_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

volumes:
  pgdata_dev:
